<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>French Irregular Present Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #fff7e8;
      --bg-peach: #f8d3ad;
      --bg-mint: #a9dcc8;
      --ink: #1f2a30;
      --ink-soft: #42545f;
      --accent: #d76235;
      --accent-deep: #a94a25;
      --teal: #0f7b6a;
      --card-light: #fffbf2;
      --card-dark: #153838;
      --danger: #9d3f2a;
      --danger-bg: #ffe7dd;
      --safe: #0f6c5f;
      --safe-bg: #daf3ea;
      --power-track: #0f3845;
      --power-fill-a: #ffe45e;
      --power-fill-b: #ff8f38;
      --progress-a: #1c8d79;
      --progress-b: #31c49e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 246, 225, 0.95), transparent 38%),
        radial-gradient(circle at 86% 12%, rgba(255, 173, 120, 0.25), transparent 34%),
        radial-gradient(circle at 78% 84%, rgba(21, 129, 111, 0.28), transparent 38%),
        linear-gradient(135deg, var(--bg-cream) 0%, var(--bg-peach) 42%, var(--bg-mint) 100%);
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: clamp(0.8rem, 3vw, 1.4rem);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(1px);
    }

    body::before {
      width: min(52vw, 420px);
      height: min(52vw, 420px);
      left: -12vw;
      top: 54vh;
      background: linear-gradient(135deg, rgba(255, 138, 78, 0.26), rgba(255, 230, 172, 0.18));
      animation: driftA 12s ease-in-out infinite alternate;
    }

    body::after {
      width: min(42vw, 360px);
      height: min(42vw, 360px);
      right: -10vw;
      top: -10vh;
      background: linear-gradient(135deg, rgba(13, 123, 106, 0.22), rgba(214, 98, 53, 0.16));
      animation: driftB 14s ease-in-out infinite alternate;
    }

    .playfield {
      width: min(1080px, 98vw);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: clamp(0.7rem, 2vw, 1.1rem);
      align-items: center;
    }

    .app {
      width: 100%;
      padding: clamp(1rem, 3.2vw, 1.9rem);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 16px 42px rgba(55, 45, 24, 0.16);
      backdrop-filter: blur(9px);
      display: grid;
      gap: clamp(0.7rem, 2.2vw, 1.1rem);
      animation: riseIn 0.7s ease-out;
    }

    .title {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(1.55rem, 4.2vw, 2.9rem);
      letter-spacing: 0.02em;
      text-align: center;
      color: #173338;
    }

    .meta {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.56rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 106px;
      padding: 0.37rem 0.77rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(33, 68, 73, 0.13);
      color: var(--ink-soft);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .pill.strong {
      background: rgba(214, 98, 53, 0.13);
      border-color: rgba(169, 74, 37, 0.22);
      color: var(--accent-deep);
    }

    .card-shell {
      width: min(760px, 92vw);
      height: min(420px, 56vh);
      min-height: 270px;
      margin: 0 auto;
      perspective: 1600px;
      position: relative;
      isolation: isolate;
    }

    .card-shell::after {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 34px;
      pointer-events: none;
      opacity: 0;
      z-index: 2;
    }

    .card-shell.animate-right .card {
      animation: cardCelebrate 0.56s ease;
    }

    .card-shell.animate-right::after {
      background:
        radial-gradient(circle at 12% 22%, rgba(255, 218, 112, 0.85) 0 8px, transparent 9px),
        radial-gradient(circle at 88% 18%, rgba(255, 138, 83, 0.88) 0 8px, transparent 9px),
        radial-gradient(circle at 78% 82%, rgba(37, 196, 154, 0.85) 0 8px, transparent 9px),
        radial-gradient(circle at 26% 76%, rgba(255, 248, 194, 0.92) 0 8px, transparent 9px),
        radial-gradient(circle at 50% 52%, rgba(255, 255, 255, 0.35) 0 48px, transparent 52px);
      animation: burstIn 0.62s ease;
    }

    .card-shell.animate-wrong .card {
      animation: cardShake 0.52s ease;
    }

    .card-shell.animate-wrong::after {
      background: linear-gradient(180deg, rgba(94, 142, 170, 0.18), rgba(83, 114, 146, 0.06));
      animation: sadFlash 0.56s ease;
    }

    .card-shell.animate-power::after {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 236, 145, 0.85) 0 16px, transparent 17px),
        radial-gradient(circle at 32% 58%, rgba(255, 162, 74, 0.65) 0 54px, transparent 58px),
        radial-gradient(circle at 68% 46%, rgba(255, 126, 65, 0.65) 0 54px, transparent 58px);
      animation: powerPulse 0.74s ease;
    }

    .card-button {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 28px;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .card-button:focus-visible {
      outline: 3px solid rgba(12, 120, 105, 0.45);
      outline-offset: 5px;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.62s cubic-bezier(0.2, 0.72, 0.2, 1);
    }

    .card.is-back {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: clamp(1.15rem, 3vw, 2.15rem);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backface-visibility: hidden;
    }

    .face.front {
      background: linear-gradient(155deg, var(--card-light) 0%, #fff4dd 52%, #ffe8cf 100%);
      border: 1px solid rgba(193, 110, 65, 0.24);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.85),
        0 20px 38px rgba(73, 43, 15, 0.16);
      color: #2a2f32;
    }

    .face.back {
      transform: rotateY(180deg);
      background: linear-gradient(160deg, #1a4746 0%, var(--card-dark) 68%, #0f2d32 100%);
      border: 1px solid rgba(225, 255, 248, 0.26);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 20px 38px rgba(12, 36, 39, 0.33);
      color: #f6fff7;
    }

    .card-text {
      margin: 0;
      max-width: 18ch;
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: clamp(1.75rem, 5vw, 3.1rem);
      line-height: 1.18;
      letter-spacing: 0.02em;
      text-wrap: balance;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.08);
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.72rem;
      flex-wrap: wrap;
    }

    .grade-btn {
      border: 0;
      border-radius: 999px;
      font-family: "Manrope", sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.62rem 1.1rem;
      min-width: 150px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .grade-btn:focus-visible {
      outline: 3px solid rgba(20, 79, 83, 0.36);
      outline-offset: 3px;
    }

    .grade-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .grade-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .grade-btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
    }

    .grade-btn.wrong {
      background: var(--danger-bg);
      color: var(--danger);
      box-shadow: 0 8px 20px rgba(130, 55, 35, 0.16);
    }

    .grade-btn.right {
      background: var(--safe-bg);
      color: var(--safe);
      box-shadow: 0 8px 20px rgba(20, 91, 79, 0.16);
    }

    .hint {
      margin: 0;
      text-align: center;
      font-size: clamp(0.84rem, 2vw, 0.98rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--teal);
      min-height: 1.3em;
    }

    .subhint {
      margin: 0;
      text-align: center;
      font-size: clamp(0.78rem, 1.9vw, 0.92rem);
      font-weight: 700;
      color: #27484f;
      letter-spacing: 0.02em;
      min-height: 1.2em;
    }

    .progress-wrap {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.2rem;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      font-size: 0.84rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 800;
      color: #1e4a52;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(13, 67, 73, 0.18);
      border: 1px solid rgba(19, 70, 74, 0.2);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--progress-a), var(--progress-b));
      box-shadow: 0 0 12px rgba(49, 196, 158, 0.44);
      transition: width 0.34s ease;
    }

    .power-rail {
      width: 96px;
      border-radius: 24px;
      padding: 0.8rem 0.6rem;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 28px rgba(24, 51, 56, 0.15);
      display: grid;
      gap: 0.5rem;
      justify-items: center;
      align-self: stretch;
      min-height: 420px;
    }

    .power-title {
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #1f4a52;
      text-align: center;
    }

    .power-track {
      width: 34px;
      height: 260px;
      border-radius: 999px;
      border: 1px solid rgba(12, 63, 72, 0.38);
      background: linear-gradient(180deg, rgba(9, 36, 47, 0.58), var(--power-track));
      padding: 4px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .power-fill {
      width: 100%;
      height: 0%;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--power-fill-a), var(--power-fill-b));
      box-shadow: 0 0 16px rgba(255, 167, 84, 0.55);
      transition: height 0.25s ease;
    }

    .power-track.power-bump .power-fill {
      animation: meterBump 0.34s ease;
    }

    .power-count,
    .bonus-count {
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 800;
      color: #244850;
      text-align: center;
      line-height: 1.2;
    }

    .bonus-toast {
      min-height: 1.2em;
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #b25522;
      text-align: center;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes driftA {
      from {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }

      to {
        transform: translate3d(24px, -18px, 0) rotate(12deg);
      }
    }

    @keyframes driftB {
      from {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }

      to {
        transform: translate3d(-18px, 20px, 0) rotate(-10deg);
      }
    }

    @keyframes cardCelebrate {
      0% { transform: scale(1) rotateX(0deg); }
      32% { transform: scale(1.03) rotateX(4deg); }
      100% { transform: scale(1) rotateX(0deg); }
    }

    @keyframes cardShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @keyframes burstIn {
      0% { opacity: 0; transform: scale(0.4); }
      40% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0; transform: scale(1.12); }
    }

    @keyframes sadFlash {
      0% { opacity: 0; }
      35% { opacity: 0.75; }
      100% { opacity: 0; }
    }

    @keyframes powerPulse {
      0% { opacity: 0; transform: scale(0.75); }
      35% { opacity: 1; transform: scale(1.03); }
      100% { opacity: 0; transform: scale(1.12); }
    }

    @keyframes meterBump {
      0% { transform: scaleY(1); }
      35% { transform: scaleY(1.08); }
      100% { transform: scaleY(1); }
    }

    @media (max-width: 860px) {
      body {
        place-items: start center;
      }

      .playfield {
        grid-template-columns: 1fr;
      }

      .power-rail {
        width: 100%;
        min-height: 0;
        grid-template-columns: auto auto auto 1fr;
        align-items: center;
        justify-items: start;
      }

      .power-track {
        width: min(60vw, 320px);
        height: 30px;
        align-items: stretch;
      }

      .power-fill {
        width: 0%;
        height: 100%;
        transition: width 0.25s ease;
      }
    }

    @media (max-width: 620px) {
      .card-shell {
        height: min(340px, 42vh);
        min-height: 220px;
      }

      .title {
        line-height: 1.1;
      }

      .pill {
        min-width: 94px;
        font-size: 0.74rem;
      }

      .grade-btn {
        min-width: 132px;
        font-size: 0.79rem;
      }

      .progress-head {
        font-size: 0.75rem;
      }
    }
  </style>
</head>

  <div class="playfield">
    <main class="app">
      <h1 class="title">French Irregular Present Deck</h1>
      <div class="meta">
        <div class="pill" id="deck-size">0 cards</div>
        <div class="pill" id="review-count">Review 1</div>
        <div class="pill" id="level-pill">Level 0</div>
        <div class="pill" id="due-pill">Due now 0</div>
        <div class="pill strong" id="side-label">Front</div>
      </div>
      <div class="card-shell" id="card-shell">
        <button class="card-button" id="card-button" aria-live="polite">
          <div class="card" id="card">
            <section class="face front">
              <p class="card-text" id="front-text"></p>
            </section>
            <section class="face back">
              <p class="card-text" id="back-text"></p>
            </section>
          </div>
        </button>
      </div>
      <div class="controls">
        <button class="grade-btn wrong" id="wrong-btn" type="button" disabled>Missed (1)</button>
        <button class="grade-btn right" id="right-btn" type="button" disabled>Got it (2)</button>
      </div>
      <p class="hint" id="hint">Click card to reveal answer</p>
      <p class="subhint" id="subhint">After reveal: click card or press 2 for correct, press 1 for missed</p>
      <section class="progress-wrap" aria-label="Mastery progress">
        <div class="progress-head">
          <span>Overall Mastery</span>
          <span id="progress-label">0.0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </section>
    </main>

    <aside class="power-rail" aria-label="Power meter">
      <div class="power-title">Power Meter</div>
      <div class="power-track" id="power-track">
        <div class="power-fill" id="power-fill"></div>
      </div>
      <div class="power-count" id="power-count">0 / 10</div>
      <div class="bonus-count" id="bonus-count">Power-ups 0</div>
      <div class="bonus-toast" id="bonus-toast"></div>
    </aside>
  </div>

k": "vous voulez"}, {"front": "to want, ils/elles ____", "back": "ils/elles veulent"}, {"front": "to want, infinitive ____", "back": "vouloir"}];
    const rightIntervals = [25, 60, 130, 260, 520];
    const wrongInterval = 8;
    const powerTarget = 10;
    const powerBonusExtraJump = 120;

    const cardShell = document.getElementById("card-shell");
    const cardButton = document.getElementById("card-button");
    const card = document.getElementById("card");
    const frontText = document.getElementById("front-text");
    const backText = document.getElementById("back-text");
    const deckSize = document.getElementById("deck-size");
    const reviewCountPill = document.getElementById("review-count");
    const levelPill = document.getElementById("level-pill");
    const duePill = document.getElementById("due-pill");
    const sideLabel = document.getElementById("side-label");
    const wrongBtn = document.getElementById("wrong-btn");
    const rightBtn = document.getElementById("right-btn");
    const hint = document.getElementById("hint");
    const subhint = document.getElementById("subhint");
    const powerTrack = document.getElementById("power-track");
    const powerFill = document.getElementById("power-fill");
    const powerCount = document.getElementById("power-count");
    const bonusCount = document.getElementById("bonus-count");
    const bonusToast = document.getElementById("bonus-toast");
    const progressFill = document.getElementById("progress-fill");
    const progressLabel = document.getElementById("progress-label");

    let studyCards = [];
    let reviewCount = 0;
    let showingFront = true;
    let currentCard = null;
    let powerLevel = 0;
    let powerUps = 0;
    let masteredCount = 0;
    let cardMastery = new Map();

    const shuffle = (array) => {
      const clone = [...array];

      for (let i = clone.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }

      return clone;
    };

    const dueNowCount = () => {
      return studyCards.filter((cardState) => cardState.dueAt <= reviewCount).length;
    };

    const pickNextCard = () => {
      if (studyCards.length === 0) {
        return null;
      }

      let pool = studyCards.filter((cardState) => cardState.dueAt <= reviewCount);

      if (pool.length === 0) {
        const earliestDue = Math.min(...studyCards.map((cardState) => cardState.dueAt));
        pool = studyCards.filter((cardState) => cardState.dueAt === earliestDue);
      }

      const smallestDue = Math.min(...pool.map((cardState) => cardState.dueAt));
      const tied = pool.filter((cardState) => cardState.dueAt === smallestDue);

      return tied[Math.floor(Math.random() * tied.length)];
    };

    const triggerCardFx = (type) => {
      cardShell.classList.remove("animate-right", "animate-wrong", "animate-power");
      void cardShell.offsetWidth;

      if (type === "right") {
        cardShell.classList.add("animate-right");
      }

      if (type === "wrong") {
        cardShell.classList.add("animate-wrong");
      }

      if (type === "power") {
        cardShell.classList.add("animate-power");
      }
    };

    const clearBonusToast = () => {
      window.setTimeout(() => {
        bonusToast.textContent = "";
      }, 1200);
    };

    const updatePowerUi = () => {
      const ratio = powerLevel / powerTarget;
      const pct = Math.max(0, Math.min(100, ratio * 100));

      if (window.matchMedia("(max-width: 860px)").matches) {
        powerFill.style.width = `${pct}%`;
        powerFill.style.height = "100%";
      } else {
        powerFill.style.width = "100%";
        powerFill.style.height = `${pct}%`;
      }

      powerCount.textContent = `${powerLevel} / ${powerTarget}`;
      bonusCount.textContent = `Power-ups ${powerUps}`;
    };

    const bumpPowerTrack = () => {
      powerTrack.classList.remove("power-bump");
      void powerTrack.offsetWidth;
      powerTrack.classList.add("power-bump");
    };

    const updateMastery = (cardId, isCorrect) => {
      const wasCorrect = cardMastery.get(cardId) || false;

      if (isCorrect && !wasCorrect) {
        cardMastery.set(cardId, true);
        masteredCount += 1;
      }

      if (!isCorrect && wasCorrect) {
        cardMastery.set(cardId, false);
        masteredCount = Math.max(0, masteredCount - 1);
      }
    };

    const updateProgressUi = () => {
      if (studyCards.length === 0) {
        progressFill.style.width = "0%";
        progressLabel.textContent = "0.0%";
        return;
      }

      const rawPct = (masteredCount / studyCards.length) * 100;
      const pct = Math.max(0, Math.min(100, rawPct));
      progressFill.style.width = `${pct}%`;
      progressLabel.textContent = `${pct.toFixed(1)}%`;
    };

    const render = () => {
      if (!currentCard) {
        frontText.textContent = "No cards found";
        backText.textContent = "No cards found";
        deckSize.textContent = "0 cards";
        reviewCountPill.textContent = "Review 0";
        levelPill.textContent = "Level 0";
        duePill.textContent = "Due now 0";
        sideLabel.textContent = "Front";
        wrongBtn.disabled = true;
        rightBtn.disabled = true;
        hint.textContent = "Add rows to the CSV and refresh";
        subhint.textContent = "";
        updatePowerUi();
        updateProgressUi();
        return;
      }

      frontText.textContent = currentCard.front;
      backText.textContent = currentCard.back;
      card.classList.toggle("is-back", !showingFront);
      deckSize.textContent = `${studyCards.length} cards`;
      reviewCountPill.textContent = `Review ${reviewCount + 1}`;
      levelPill.textContent = `Level ${currentCard.level}`;
      duePill.textContent = `Due now ${dueNowCount()}`;
      sideLabel.textContent = showingFront ? "Front" : "Back";
      wrongBtn.disabled = showingFront;
      rightBtn.disabled = showingFront;
      hint.textContent = showingFront
        ? "Click card to reveal answer"
        : "Choose Missed or Got it";
      subhint.textContent = showingFront
        ? "Press space or enter to flip"
        : "1 = Missed, 2 = Got it, click card = Got it";
      cardButton.setAttribute("aria-label", showingFront ? currentCard.front : currentCard.back);
      updatePowerUi();
      updateProgressUi();
    };

    const revealCard = () => {
      if (!currentCard || !showingFront) {
        return;
      }

      showingFront = false;
      render();
    };

    const scheduleCard = (isCorrect) => {
      if (!currentCard || showingFront) {
        return;
      }

      reviewCount += 1;
      updateMastery(currentCard.id, isCorrect);

      let earnedPowerUp = false;

      if (isCorrect) {
        currentCard.level = Math.min(currentCard.level + 1, rightIntervals.length);

        let jump = rightIntervals[currentCard.level - 1];
        powerLevel = Math.min(powerTarget, powerLevel + 1);
        bumpPowerTrack();

        if (powerLevel >= powerTarget) {
          earnedPowerUp = true;
          powerUps += 1;
          powerLevel = 0;
          jump += powerBonusExtraJump;
          currentCard.level = Math.min(currentCard.level + 1, rightIntervals.length);
          bonusToast.textContent = `Power Up! Bonus +${powerBonusExtraJump}`;
          clearBonusToast();
        }

        currentCard.dueAt = reviewCount + jump;
      } else {
        currentCard.level = Math.max(0, currentCard.level - 1);
        currentCard.dueAt = reviewCount + wrongInterval;
        powerLevel = 0;
        bonusToast.textContent = "";
      }

      if (isCorrect && earnedPowerUp) {
        triggerCardFx("power");
      } else if (isCorrect) {
        triggerCardFx("right");
      } else {
        triggerCardFx("wrong");
      }

      currentCard = pickNextCard();
      showingFront = true;
      render();
    };

    const onCardClick = () => {
      if (showingFront) {
        revealCard();
        return;
      }

      scheduleCard(true);
    };

    cardButton.addEventListener("click", onCardClick);
    wrongBtn.addEventListener("click", () => scheduleCard(false));
    rightBtn.addEventListener("click", () => scheduleCard(true));
    window.addEventListener("resize", updatePowerUi);

    document.addEventListener("keydown", (event) => {
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();

        if (showingFront) {
          revealCard();
        } else {
          scheduleCard(true);
        }

        return;
      }

      if (showingFront) {
        return;
      }

      if (event.key === "1") {
        event.preventDefault();
        scheduleCard(false);
      }

      if (event.key === "2") {
        event.preventDefault();
        scheduleCard(true);
      }
    });

    if (cards.length > 0) {
      studyCards = shuffle(cards).map((cardData, index) => ({
        id: index,
        front: cardData.front,
        back: cardData.back,
        level: 0,
        dueAt: index,
      }));

      cardMastery = new Map(studyCards.map((cardState) => [cardState.id, false]));
      currentCard = pickNextCard();
    }

    render();
  </script>
